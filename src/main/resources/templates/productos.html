<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Tienda - Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <!-- Barra de usuario -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>🏪 Gestión de Productos</h1>
        <div>
            <span class="me-3">
                Bienvenido, <strong sec:authentication="name"></strong>
            </span>
            <form th:action="@{/vista/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-danger btn-sm">
                    Cerrar sesión
                </button>
            </form>
        </div>
    </div>

    <!-- Formulario agregar/editar producto -->
    <div sec:authorize="hasAuthority('ROLE_ADMIN')">
        <div class="card mb-4">
            <div class="card-header text-white"
                 th:classappend="${producto.id != 0} ? 'bg-warning' : 'bg-primary'">
                <h5 class="mb-0"
                    th:text="${producto.id != 0} ? 'Editar Producto' : 'Agregar Producto'">
                </h5>
            </div>
            <div class="card-body">
                <form th:action="${producto.id != 0} ?
                      @{/vista/productos/actualizar/{id}(id=${producto.id})} :
                      @{/vista/productos/guardar}"
                      th:object="${producto}" method="post">
                    <div class="row">
                        <div class="col-md-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control"
                                   th:field="*{nombre}" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Precio</label>
                            <input type="number" step="0.01" class="form-control"
                                   th:field="*{precio}" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Stock</label>
                            <input type="number" class="form-control"
                                   th:field="*{stock}" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Categoria</label>
                            <select class="form-select" th:field="*{categoria}">
                                <option th:each="cat : ${categorias}"
                                        th:value="${cat.id}"
                                        th:text="${cat.nombre}">
                                </option>
                            </select>
                        </div>
                        <div class="col-md-2 d-flex align-items-end gap-2">
                            <button type="submit" class="btn w-100"
                                    th:classappend="${producto.id != 0} ? 'btn-warning' : 'btn-primary'"
                                    th:text="${producto.id != 0} ? 'Actualizar' : 'Agregar'">
                            </button>
                            <a th:if="${producto.id != 0}"
                               href="/vista/productos"
                               class="btn btn-secondary w-100">Cancelar</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Tabla de productos -->
    <div class="card">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">Lista de Productos</h5>
        </div>
        <div class="card-body">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Categoria</th>
                    <th sec:authorize="hasAuthority('ROLE_ADMIN')">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="prod : ${productos}">
                    <td th:text="${prod.id}"></td>
                    <td th:text="${prod.nombre}"></td>
                    <td th:text="${prod.precio} + ' EUR'"></td>
                    <td th:text="${prod.stock}"></td>
                    <td th:text="${prod.categoria != null ? prod.categoria.nombre : 'Sin categoria'}"></td>
                    <td sec:authorize="hasAuthority('ROLE_ADMIN')" class="d-flex gap-2">
                        <a th:href="@{/vista/productos/editar/{id}(id=${prod.id})}"
                           class="btn btn-warning btn-sm">
                            Editar
                        </a>
                        <a th:href="@{/vista/productos/eliminar/{id}(id=${prod.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Eliminar este producto?')">
                            Eliminar
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
